{% extends 'vault/base.html' %}
{% block title %}О сайте{% endblock title %}

{% block content %}
<div class="about-card">
    <h1 class="about-title">Проект создан в обучающих целях</h1>

    <p class="about-text">
        При поддержке
        <a class="about-link" href="https://spb.top-academy.ru/" target="_blank" rel="noopener">Академии TOP</a>
    </p>

    <p class="about-author">Работу выполнила <strong>Евгения Г.</strong></p>

    <hr class="about-divider">

    <h2 class="about-subtitle">Понравился проект?</h2>
    <p class="about-text">
        Для обратной связи используйте e-mail:
        <a class="about-link" href="mailto:eva_56@list.ru">eva_56@list.ru</a>
    </p>
</div>

<style>
    /* Современный шрифт и центрирование карточки */
    .about-card {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 550px;
        margin: 50px auto;
        padding: 30px;
        text-align: center;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        color: #2d3748;
    }

    /* Стили для заголовков */
    .about-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .about-subtitle { font-size: 1.2rem; font-weight: 600; margin-top: 20px; }

    /* Текст и автор */
    .about-text { color: #718096; line-height: 1.5; font-size: 1rem; }
    .about-author { color: #4a5568; font-size: 1.05rem; margin-top: 15px; }

    /* Разделительная линия */
    .about-divider { border: 0; height: 1px; background: #edf2f7; margin: 25px 0; }

    /* Аккуратные современные ссылки */
    .about-link {
        color: #3182ce;
        text-decoration: none;
        font-weight: 500;
        border-bottom: 1px solid transparent;
        transition: all 0.2s ease;
    }
    .about-link:hover {
        color: #2b6cb0;
        border-bottom-color: #2b6cb0;
    }
</style>
{% endblock content %}
